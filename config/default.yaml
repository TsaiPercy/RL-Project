# ============================================================
# Default Configuration – RLVR Game Level Generation
# ============================================================
# Canonical source: docs/SPEC.md §11 Pseudo Config

# === Game ===
game: "minigrid"                    # "minigrid" or "minihack"
# [impl-updated 2026-05-07] LLM 改為輸出完整 15×15 grid（含外牆 W ring）
grid_size: 15                       # full grid size (LLM outputs 15×15 incl. outer walls; objects/agent in [1,13])

# === LLM Policy (Module A) ===
model_name: "Qwen/Qwen3.5-9B"
quantization: "4bit"                # QLoRA for 4090
lora_rank: 64
lora_alpha: 128
lora_target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj
max_new_tokens: 2048
# [impl-updated 2026-05-07] Qwen3.5 non-thinking 模式官方建議採樣參數。
# Per https://huggingface.co/Qwen/Qwen3.5-9B model card。
enable_thinking: false              # Qwen3.5 chat template 旗標；false = 跳過 reasoning 直接答（QwenSpec 不支援 /no_think directive，必須走這個路徑）
temperature: 0.7                    # 官方建議 non-thinking 0.7
top_p: 0.8                          # 官方建議 non-thinking 0.8（原本寫死在 generate() 裡的 0.95 太散）
top_k: 20                           # 官方建議
presence_penalty: 1.5               # 官方建議，抑制重複 token

# === GRPO Training ===
group_size: 8                      # samples per prompt
kl_coeff: 0.05
learning_rate: 1.0e-5
batch_size: 2                       # prompts per batch (total = 4 × 16 = 64 levels)
num_iterations: 500
# [impl-updated 2026-05-07] 移除 gradient_accumulation_steps（與
# micro_batch_size 概念重複；GRPO 的 effective batch 已由
# batch_size × group_size 決定，不需另外指定累積次數）。
micro_batch_size: 4                 # GPU 一次 forward+backward 幾條序列；
                                    # update() 內部累積 ceil(B*G / micro)
                                    # 個 chunk 的梯度後做 1 次 optimizer.step()。
                                    # 4090 + Qwen 9B QLoRA 設 1；A100/H100 可試 2-4。

# === Reward (Module C) ===
regret_weight: 1.0
playability_bonus: 1.0
invalid_penalty: -1.0
# strategy_breadth_weight: 0.0     # [deferred] — PD-1

# === Rollout (Module B) ===
num_rollouts_per_agent: 5
num_envs: 16                        # SubprocVecEnv parallel environments
agent_pool_path: "checkpoints/agents/"
training_agents:
  - strong_0                        # self-trained, full curriculum
  - weak_0                          # self-trained, partial curriculum
held_out_agents:
  - strong_held_0                   # self-trained, full curriculum (different seed)
  - weak_held_0                     # self-trained, partial curriculum (different seed)

# === Agent Curriculum Training (Phase 1-2) ===
# [impl-updated] Curriculum replaced with GoTo family (9 levels); keys renamed
# success_threshold_override → success_increase, total_timesteps → max_timesteps
# Per SPEC §5.4 [updated] and §11.4 [updated]
agent_training:
  # [impl-updated] room_size override removed — each curriculum env uses its
  # native default size. Smaller mazes mean faster episodes and far less
  # rejection-sampling chatter from BabyAI's level generator.
  # [impl-updated AT-4.x] Phase A dict obs + mission encoding.  MissionTokenizer
  # converts BabyAI's raw dict obs into {image, direction, mission} so the
  # policy (PPO MultiInputPolicy + BabyAIDictExtractor) can read the goal.
  mission_max_len: 8                  # GoTo missions ≤ 6 tokens; pad to 8
  vocab_size: 16                      # len(BABYAI_VOCAB) — must match agent_training/wrappers.py
  text_embed_dim: 32                  # mission token embedding width
  dir_embed_dim: 8                    # direction (0..3) embedding width
  eval_episodes: 50                   # episodes per success-rate evaluation
  eval_chunk_steps: 100_000           # train steps between evaluations
  curriculum:                         # GoTo family ordered easy → hard [impl-updated]
    - env: "BabyAI-GoTo-v0"
      success_threshold: 0.90         # trivial task; high bar
    - env: "BabyAI-GoToOpen-v0"
      success_threshold: 0.85
    - env: "BabyAI-GoToObjMaze-v0"
      success_threshold: 0.80
    - env: "BabyAI-GoToObjMazeOpen-v0"
      success_threshold: 0.80
    - env: "BabyAI-GoToObjMazeS4R2-v0"
      success_threshold: 0.75
    - env: "BabyAI-GoToObjMazeS4-v0"
      success_threshold: 0.75
    - env: "BabyAI-GoToObjMazeS5-v0"
      success_threshold: 0.70
    - env: "BabyAI-GoToObjMazeS6-v0"
      success_threshold: 0.65
    - env: "BabyAI-GoToObjMazeS7-v0"
      success_threshold: 0.60         # hardest; lower bar acceptable
  strong_agent:
    curriculum_levels: 9              # train through all 9 levels [impl-updated]
    success_increase: 0.05            # effective = base + 0.05 [impl-updated]
    max_timesteps: 5_000_000          # total budget across all levels [impl-updated]
  weak_agent:
    curriculum_levels: 3              # only train first 3 levels [impl-updated]
    success_increase: -0.25           # effective = base - 0.25 [impl-updated]
    max_timesteps: 1_000_000          # [impl-updated]
  ppo_hyperparams:
    learning_rate: 3.0e-4
    n_steps: 2048
    batch_size: 64
    n_epochs: 10
    gamma: 0.99
    ent_coef: 0.01
    features_dim: 256                 # [impl-updated AT-4.x] renamed from cnn_features_dim; output dim of BabyAIDictExtractor (CNN + mission text + direction fusion)

# === Toy Case (Phase 0) ===
toy_case:
  train_env: "MiniGrid-DoorKey-15x15-v0"
  strong_agent_steps: 1_000_000       # PPO training steps for strong agent
  weak_agent_steps: 50_000            # PPO training steps for weak agent (early stop)
  toy_agents:
    - toy_strong_0
    - toy_weak_0
  num_test_levels: 20                 # LLM zero-shot levels for smoke test
  ppo_hyperparams:
    learning_rate: 3.0e-4
    n_steps: 2048
    batch_size: 64
    n_epochs: 10
    gamma: 0.99
    ent_coef: 0.01

# === Evaluation ===
eval_num_levels: 100                # levels per evaluation
eval_interval: 50                   # evaluate every N iterations

# === Cache ===
cache_dir: "cache/huggingface"         # HuggingFace model/tokenizer cache (project-local)

# === Logging ===
wandb_project: "rlvr-level-gen"
checkpoint_dir: "checkpoints/"
log_dir: "logs/"
